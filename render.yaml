services:
  - type: web
    name: vivere-con-il-cane
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: sh run.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /
    healthCheckTimeout: 30
    healthCheckInterval: 10