services:
  - type: web
    name: vivere-con-il-cane
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python start.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DEBUG
        value: "true"
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /
    healthCheckTimeout: 30
    healthCheckInterval: 10