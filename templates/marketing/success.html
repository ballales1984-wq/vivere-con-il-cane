{% load i18n %}
<div id="newsletter-container" class="newsletter-box success-state" style="background: #f0fdf4; padding: 3rem; border-radius: 24px; text-align: center; max-width: 800px; margin: 4rem auto; border: 2px solid #bbf7d0; animation: fadeIn 0.5s ease-out;">
    <span style="font-size: 3.5rem; display: block; margin-bottom: 1rem;">🎉</span>
    <h2 style="color: #166534; font-size: 1.8rem; margin-bottom: 1rem; font-weight: 800;">{% trans "Benvenuto a bordo!" %}</h2>
    <p style="color: #15803d; font-size: 1.1rem; line-height: 1.6;">
        {% blocktrans %}Grazie per esserti iscritto! Abbiamo inviato una conferma a <strong>{{ email }}</strong>.{% endblocktrans %}<br>
        {% trans "Presto riceverai i nostri migliori consigli per il tuo cane." %}
    </p>
    <div style="margin-top: 2rem;">
        <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#166534" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
    </div>
</div>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
