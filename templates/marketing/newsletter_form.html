{% load i18n %}
<div id="newsletter-container" style="background: white; padding: 4rem; border-radius: var(--radius-xl); box-shadow: var(--shadow-premium); text-align: center; max-width: 850px; margin: 6rem auto; border: 1px solid var(--border); position: relative; overflow: hidden;">
    <!-- Background Decor -->
    <div style="position: absolute; top: -40px; right: -40px; width: 120px; height: 120px; background: var(--primary); opacity: 0.05; border-radius: 50%;"></div>
    <div style="position: absolute; bottom: -30px; left: -30px; width: 80px; height: 80px; background: var(--accent); opacity: 0.1; border-radius: 50%;"></div>

    <div style="font-size: 3rem; margin-bottom: 1.5rem;">💌</div>
    <h2 style="color: var(--secondary); font-size: 2.2rem; margin-bottom: 0.75rem; font-family: 'Outfit', sans-serif;">{% trans "Resta aggiornato" %}</h2>
    <p style="color: var(--text-muted); margin-bottom: 2.5rem; font-size: 1.15rem; max-width: 580px; margin-left: auto; margin-right: auto;">
        {% trans "Ricevi i nuovi articoli e le analisi IA direttamente nella tua inbox. Niente spam, solo scienza e amore per i cani." %}
    </p>
    
    <form hx-post="{% url 'subscribe_newsletter' %}" hx-target="#newsletter-container" hx-swap="outerHTML" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; max-width: 600px; margin: 0 auto;">
        {% csrf_token %}
        <input type="email" name="email" placeholder="{% trans 'La tua email migliore' %}" required 
               style="flex: 1; min-width: 280px; padding: 1.1rem 1.5rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 1.05rem; outline: none; transition: var(--transition); box-shadow: var(--shadow-sm);"
               onfocus="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 0 0 4px rgba(5, 150, 105, 0.1)'" onblur="this.style.borderColor='var(--border)'; this.style.boxShadow='var(--shadow-sm)'">
        <button type="submit" class="btn btn-primary" style="padding: 1rem 2.5rem; font-size: 1.05rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);">
            {% trans "Iscriviti Ora" %}
        </button>
    </form>
    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 2rem; font-weight: 500;">
        🛡️ {% trans "Rispettiamo la tua privacy al 100%. Leggi la nostra" %} <a href="{% url 'privacy_policy' %}" style="text-decoration: none; color: var(--primary); font-weight: 700;">Privacy Policy</a>.
    </p>
</div>
