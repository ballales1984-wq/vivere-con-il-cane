{% extends "community/base_community.html" %}
{% load static %}

{% block content %}
<div class="container py-4">
  <h2 class="mb-4">Categorie</h2>
  <div class="row">
    {% for cat in categories %}
    <div class="col-md-6 col-lg-4 mb-3">
      <a href="{% url 'community:discussions_by_category' cat.slug %}" class="text-decoration-none">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">{{ cat.name }}</h5>
            <p class="card-text text-muted">{{ cat.discussion_count }} discussioni</p>
          </div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
