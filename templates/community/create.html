{% extends "community/base_community.html" %}
{% load static %}

{% block content %}
<div class="container py-4">
  <h2 class="mb-4">Nuova Discussione</h2>
  <div class="row">
    <div class="col-lg-8">
      <form method="post" id="discussionForm">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Titolo</label>
          <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Categoria</label>
          <select name="category" class="form-select" required>
            <option value="">Seleziona...</option>
            {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
            {% endfor %}
          </select>
        </div>
        {% if dogs.exists %}
        <div class="mb-3">
          <label class="form-label">Il tuo cane</label>
          <select name="dog" class="form-select">
            <option value="">Nessuno</option>
            {% for dog in dogs %}
            <option value="{{ dog.id }}">{{ dog.dog_name }} ({{ dog.breed }})</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label">Contenuto</label>
          <textarea name="content" class="form-control" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Pubblica</button>
      </form>
    </div>
  </div>
</div>

<script>
document.getElementById('discussionForm')?.addEventListener('submit', function(e) {
  e.preventDefault();
  const formData = new FormData(this);
  fetch(window.location.href + 'crea/', {
    method: 'POST',
    body: formData
  }).then(r => {
    if (r.redirected) window.location.href = r.url;
    else r.text().then(html => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const formErrors = doc.querySelector('form');
      if (formErrors) {
        document.getElementById('discussionForm').innerHTML = formErrors.innerHTML;
      }
    });
  });
});
</script>
{% endblock %}
