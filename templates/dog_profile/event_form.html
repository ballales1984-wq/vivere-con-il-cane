{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Nuovo Evento" %} - Vivere con il Cane{% endblock %}

{% block content %}
<section class="hero">
    <h1>{% trans "Aggiungi Evento di Salute" %}</h1>
    <p>{% trans "Per" %} {{ profile.dog_name }}</p>
</section>

<section class="tool-container">
    <form method="post" class="calculator-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label>{% trans "Tipo evento" %}</label>
            <select name="event_type" required>
                <option value="vaccine">{% trans "Vaccino" %}</option>
                <option value="checkup">{% trans "Visita" %}</option>
                <option value="medicine">{% trans "Medicina" %}</option>
                <option value="illness">{% trans "Malattia" %}</option>
                <option value="injury">{% trans "Infortunio" %}</option>
                <option value="other">{% trans "Altro" %}</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>{% trans "Titolo" %}</label>
            <input type="text" name="title" required placeholder="Vaccino annuale">
        </div>
        
        <div class="form-group">
            <label>{% trans "Descrizione" %}</label>
            <textarea name="description" rows="3" placeholder="Dettagli..."></textarea>
        </div>
        
        <div class="form-group">
            <label>{% trans "Data" %}</label>
            <input type="date" name="date" required>
        </div>
        
        <button type="submit" class="btn-calculate">{% trans "Salva Evento" %}</button>
    </form>
</section>
{% endblock %}
