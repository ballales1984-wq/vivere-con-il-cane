{% extends 'base.html' %}

{% block title %}Nuovo Evento - Vivere con il Cane{% endblock %}

{% block content %}
<section class="hero">
    <h1>Aggiungi Evento di Salute</h1>
    <p>Per {{ profile.dog_name }}</p>
</section>

<section class="tool-container">
    <form method="post" class="calculator-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label>Tipo evento</label>
            <select name="event_type" required>
                <option value="vaccine">Vaccino</option>
                <option value="checkup">Visita</option>
                <option value="medicine">Medicina</option>
                <option value="illness">Malattia</option>
                <option value="injury">Infortunio</option>
                <option value="other">Altro</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Titolo</label>
            <input type="text" name="title" required placeholder="Vaccino annuale">
        </div>
        
        <div class="form-group">
            <label>Descrizione</label>
            <textarea name="description" rows="3" placeholder="Dettagli..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Data</label>
            <input type="date" name="date" required>
        </div>
        
        <button type="submit" class="btn-calculate">Salva Evento</button>
    </form>
</section>
{% endblock %}
